# Mapping from LMS15 "substance" (unit type 3) codes to eHDSI unit values.
#
# Codes and values are based on the agreed substance unit map with LMS. Should be found under the semantics folder
# on sharepoint.
#
# Values are maps of
# - "lms15-display-name" the description from LMS15, if there is information there that cannot be coded.
# - "numerator" the unit type of the numerator, defaults to "1"
# - "denominator" the unit type of the denominator, defaults to "1"
# - "denominatorValue" the value of the denominator. Must be parseable as a BigDecimal. Defaults to "1"

"AGU":
  numerator: "[AU]"
"CL":
  numerator: "{cells}"
"CML":
  numerator: "{cells}"
  denominator: "mL"
"EUM":
  numerator: "[ELISA'U]"
  denominator: "mL"
"G":
  numerator: "g"
"GL":
  numerator: "g"
  denominator: "L"
"GML":
  numerator: "g"
  denominator: "mL"
"IU": # Internationale enheder
  numerator: "[IU]"
"IUG":
  numerator: "[IU]"
  denominator: "g"
"IUI":
  numerator: "[IU]"
  denominator: "mg"
"IUM":
  numerator: "[IU]"
  denominator: "mL"
"KBM":
  numerator: "kBq"
  denominator: "mL"
"KG":
  numerator: "kg"
"LT":
  numerator: "L"
"MEM":
  numerator: "10*6"
  denominator: "mL"
"MEQ":
  numerator: "meq"
"MG":
  numerator: "mg"
"MGF":
  numerator: "mg"
  denominator: "(72.h)"
"MGG":
  numerator: "mg"
  denominator: "g"
"MGH":
  numerator: "mg"
  denominator: "(24.h)"
"MGK":
  numerator: "mg"
  denominator: "cm2"
"MGL":
  numerator: "mg"
  denominator: "L"
"MGM": # mg/ml
  numerator: "mg"
  denominator: "mL"
"MIM":
  numerator: "10*6[IU]"
  denominator: "mL"
"MIU":
  numerator: "10*6[IU]"
"ML":
  numerator: "mL"
"MML":
  numerator: "mmol"
  denominator: "mL"
"MMO":
  numerator: "mmol"
"MOM":
  numerator: "mmol"
  denominator: "mL"
"PC":
  numerator: "%"
"PPM":
  numerator: "[ppm]"
"RG": # mikrogram
  numerator: "ug"
"RGD":
  numerator: "ug"
  lms15-display-name: "mikrogram/dosis"
"RGG":
  numerator: "ug"
  denominator: "g"
"RGH":
  numerator: "ug"
