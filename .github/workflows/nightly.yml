name: Nightly integration test

on:
  workflow_dispatch:
  schedule:
    - cron: "30 01 * * *"

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven
      - name: Build with Maven
        run:  |
          cd country-a-service
          mvn --batch-mode --projects testing-tools --also-make -DskipUTs package
      - name: Create new prescriptions in FMK
        run: java -cp country-a-service/testing-tools/target/testing-tools-1.0.0-SNAPSHOT-shaded.jar dk.nsp.epps.script.CreateNewPrescriptionUtil
      - name: Get the prescriptions from FMK
        run: java -cp country-a-service/testing-tools/target/testing-tools-1.0.0-SNAPSHOT-shaded.jar dk.nsp.epps.script.GetPrescriptionsFromFmkUtil
      - name: Generate ePrescription documents
        run: java -cp country-a-service/testing-tools/target/testing-tools-1.0.0-SNAPSHOT-shaded.jar dk.nsp.epps.script.GenerateCdaDocumentUtil
      - name: Set up Docker
        run: sudo service docker start

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

        # TODO: fix path
      - name: Generate eDispensation CDA
        run: |
          docker pull ghcr.io/sundhedsdatastyrelsen/ehealth-portal-edispensation-generator:generate-edispensation-cli
          docker run \
          -v ${{ github.workspace }}/testing-shared/src/main/resources/test-file-storage/cda-prepared-0201909309.xml:/opt/app/input/ep.xml \
          ghcr.io/sundhedsdatastyrelsen/ehealth-portal-edispensation-generator:generate-edispensation-cli > testing-shared/src/main/resources/test-file-storage/edispensation-cda.xml
      - name: Upload eDispensation CDAs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ep-and-ed-files
          path: testing-shared/src/main/resources/test-file-storage/

      - name: Run integration tests
        run: |
          cd country-a-service
          mvn --batch-mode --projects integration-tests --also-make \
            verify -DskipITs=false -DskipUTs \
            -DeDispensationITPath=${{ github.workspace }}/testing-shared/src/main/resources/test-file-storage/edispensation-cda.xml

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        if: success() || failure() # always run even if the previous step fails
        with:
          report_paths: 'country-a-service/integration-tests/target/failsafe-reports/TEST-*.xml'

      - name: Post to a Slack channel
        id: slack
        uses: slackapi/slack-github-action@v1.27.0
        if: success() || failure() # always run even if the previous step fails
        # See: https://github.com/slackapi/slack-github-action?tab=readme-ov-file#technique-2-slack-app
        with:
          channel-id: 'C07Q2AG46HL' # #github-actions-bot-test
          # we could use a json body for a richer message, see docs
          slack-message: |
            GitHub build result: ${{ job.status }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
